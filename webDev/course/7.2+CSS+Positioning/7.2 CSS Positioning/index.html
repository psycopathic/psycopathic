<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    .blue-box{
      width: 500px;
      height: 300px;
      background-color: blue;
      position: relative;
      top: 200px;
      left: 200px;
    }
    .red-circle{
      background-color: red;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      position: absolute;
      top: 150px;
      left: 250px;
    }
  </style>
</head>

<body>
  <div class="blue-box">
    <div class="red-circle">
    </div>
  </div>

</body>

</html>


<!-- position it has four values 
1.static
2.relative
3.fixed
4.absolute
5.sticky

what happen when we use position?
it is a specified type of property for setting up the position of an element
elements are position by using left,right,top and bottom

STATIC: by default
no nee of left right or anything

RELATIVE: the object is positioned relative to its normal position
setting the top,bottom,left and right-->
