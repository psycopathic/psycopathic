<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            float: left; 
            margin-top: 10%;
        }
        .r1 {
            width: 100%;
            text-align: center;
        }
        .r2 {
            width: 100%;
            text-align: center;
            font-size: 20px;
        }
        .b1 {
            background-color: green;
            border: none;
            color: aliceblue;
            width: 200px;
            font-weight: 200px;
            font-size: 40px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="r1">
        <div id="r2" class="r2">0</div>
        <button onclick="fun1()" class="b1">Start</button>
        <button onclick="fun2()" class="b1">Stop</button>
    </div>
    <script>
        var c = 0;
        var p;

        function start() {
            c++;
            document.getElementById("r2").innerHTML = c;
        }

        function fun1() {
            c = 0;
            clearInterval(p); // Clear any existing interval
            p = setInterval(start, 100);
        }

        function fun2() {
            clearInterval(p);
        }
    </script>
</body>
</html>
